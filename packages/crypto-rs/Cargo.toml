[package]
name = "ritkey-crypto"
version = "1.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
# TSS - Multi-Party ECDSA (using compatible versions)
multi-party-ecdsa = { git = "https://github.com/ZenGo-X/multi-party-ecdsa", branch = "master" }
curv-kzen = { version = "0.9", default-features = false }
paillier = { version = "0.4", package = "kzen-paillier" }

# Secret Sharing (fallback)
sharks = "0.5"

# Cryptography
secp256k1 = { version = "0.28", features = ["rand-std", "global-context"] }
sha2 = "0.10"
sha3 = "0.10"
aes-gcm = "0.10"
rand = "0.8"

# Memory Safety
zeroize = { version = "1.7", features = ["derive"] }

# Node.js Bindings
napi = "2.16"
napi-derive = "2.16"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4"

# Error Handling
thiserror = "1.0"

[build-dependencies]
napi-build = "2.1"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
